version: '3.8'

services:
  postgres:
    image: postgres:15
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: customer_db

  mock-server:
    build: ./mock-server
    ports:
      - "5000:5000"
    depends_on:
      - postgres